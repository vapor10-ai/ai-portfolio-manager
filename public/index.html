<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e17">
<title>AI Portfolio Manager</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0e17;--bg2:#111827;--card:#1a2035;--hover:#222b42;--brd:#1e2538;--t1:#e8eaed;--t2:#8b95a8;--t3:#5a6478;--acc:#00d4aa;--accd:rgba(0,212,170,.12);--grn:#00d4aa;--red:#ff4757;--yel:#ffa726;--blu:#42a5f5;--pur:#ab47bc;--org:#ff7043;--nav:64px;--hdr:52px;--sab:env(safe-area-inset-bottom,0px)}
[data-theme=light]{--bg:#f0f2f5;--bg2:#fff;--card:#fff;--hover:#f5f5f5;--brd:#e2e8f0;--t1:#1a202c;--t2:#64748b;--t3:#94a3b8;--acc:#0d9488;--accd:rgba(13,148,136,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro','Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
input,select,textarea{background:var(--bg2);border:1px solid var(--brd);color:var(--t1);border-radius:10px;padding:10px 14px;font-size:14px;width:100%;outline:none;transition:border .2s;font-family:inherit}
input:focus{border-color:var(--acc)}
button{cursor:pointer;border:none;font-family:inherit;font-size:14px;transition:all .15s;-webkit-tap-highlight-color:transparent}
.bp{background:var(--acc);color:#000;padding:10px 20px;border-radius:10px;font-weight:600}
.bs{background:var(--hover);color:var(--t1);padding:10px 20px;border-radius:10px;font-weight:500}
.bd{background:rgba(255,71,87,.12);color:var(--red);padding:8px 16px;border-radius:8px;font-weight:500}
.c{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:16px;margin-bottom:12px}
.b{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.bg{background:rgba(0,212,170,.12);color:var(--grn)}.br{background:rgba(255,71,87,.12);color:var(--red)}
.by{background:rgba(255,167,38,.12);color:var(--yel)}.bb{background:rgba(66,165,245,.12);color:var(--blu)}
.bpu{background:rgba(171,71,188,.12);color:var(--pur)}
.fi{animation:fi .3s ease}@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{width:20px;height:20px;border:2px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:1000;padding:0;backdrop-filter:blur(4px)}
.mo.mo2{z-index:1010}
.mc{background:var(--card);border:1px solid var(--brd);border-radius:20px 20px 0 0;padding:20px;padding-bottom:calc(20px + var(--sab));width:100%;max-width:600px;max-height:88vh;max-height:88dvh;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.mc.fi{overflow:hidden !important;display:flex;flex-direction:column;max-height:85vh;max-height:85dvh}
@media(min-width:600px){.mo{align-items:center;padding:20px}.mc{border-radius:16px;max-height:85vh;padding-bottom:20px}}
.pb{height:6px;background:var(--hover);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .5s ease}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sr{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--brd);cursor:pointer}
.sr:last-child{border-bottom:none}
.sr:active{background:var(--hover);margin:0 -16px;padding:14px 16px;border-radius:8px}
.pill{display:flex;background:var(--bg2);border-radius:10px;padding:3px;gap:2px;margin-bottom:16px}
.pill button{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:500;color:var(--t2);background:none}
.pill button.active{background:var(--acc);color:#000;font-weight:600}
.live{width:6px;height:6px;border-radius:50%;background:var(--grn);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
canvas{max-width:100%}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;

// ─── Storage (localStorage cache + server DB) ───
const S = {
  g: (k,d) => { try{const v=localStorage.getItem('pm2_'+k);return v?JSON.parse(v):d}catch{return d} },
  s: (k,v) => { try{localStorage.setItem('pm2_'+k,JSON.stringify(v))}catch{} },
};

// ─── API Client ───
function getDataHeaders() {
  const src = S.g('dataSource', 'yahoo');
  const avKey = S.g('avKey', '');
  const h = {};
  if (src === 'alphavantage') h['x-data-source'] = 'alphavantage';
  if (avKey) h['x-av-key'] = avKey;
  return h;
}
const api = {
  get: async (url) => { const r = await fetch(url, {headers: getDataHeaders()}); if(!r.ok) throw new Error((await r.json().catch(()=>({}))).error||r.statusText); return r.json(); },
  post: async (url, body) => { const r = await fetch(url, {method:'POST',headers:{'Content-Type':'application/json', ...getDataHeaders()},body:JSON.stringify(body)}); if(!r.ok) throw new Error((await r.json().catch(()=>({}))).error||r.statusText); return r.json(); },
  put: async (url, body) => { const r = await fetch(url, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); if(!r.ok) throw new Error((await r.json().catch(()=>({}))).error||r.statusText); return r.json(); },
  del: async (url) => { const r = await fetch(url, {method:'DELETE'}); if(!r.ok) throw new Error((await r.json().catch(()=>({}))).error||r.statusText); return r.json(); },
};

// ─── Server Sync (debounced) ───
const syncTimers = {};
function syncToServer(key, data) {
  clearTimeout(syncTimers[key]);
  syncTimers[key] = setTimeout(() => {
    if (key === 'positions') {
      api.put('/api/db/positions/sync', { positions: data }).catch(e => console.warn('Sync positions failed:', e));
    } else if (key === 'watchlists') {
      api.put('/api/db/watchlists/sync', { watchlists: data }).catch(e => console.warn('Sync watchlists failed:', e));
    } else {
      api.put('/api/db/settings', { key, value: data }).catch(e => console.warn('Sync setting failed:', e));
    }
  }, 500);
}

// ─── Formatting ───
const F = {
  $: n => {if(n==null||typeof n==='object')return'—';const v=Number(n);return isNaN(v)?'—':'$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})},
  pct: n => {if(n==null||typeof n==='object')return'—';const v=Number(n);return isNaN(v)?'—':(v>=0?'+':'')+v.toFixed(2)+'%'},
  c: n => {if(n==null||typeof n==='object')return'—';const v=Number(n);if(isNaN(v))return'—';const a=Math.abs(v);if(a>=1e12)return'$'+(v/1e12).toFixed(1)+'T';if(a>=1e9)return'$'+(v/1e9).toFixed(1)+'B';if(a>=1e6)return'$'+(v/1e6).toFixed(1)+'M';return'$'+v.toLocaleString()},
  n: (n,d=2) => {if(n==null||typeof n==='object')return'—';const v=Number(n);return isNaN(v)?'—':v.toFixed(d)},
};

// ─── Sectors ───
const SEC={'AAPL':'Tech','MSFT':'Tech','GOOGL':'Tech','AMZN':'Cons.Cyc','NVDA':'Tech','TSLA':'Cons.Cyc','META':'Tech','JPM':'Finance','JNJ':'Health','V':'Finance','WMT':'Cons.Def','PG':'Cons.Def','UNH':'Health','MA':'Finance','HD':'Cons.Cyc','DIS':'Comms','NFLX':'Comms','PYPL':'Finance','AMD':'Tech','INTC':'Tech','BA':'Industrial','CRM':'Tech','COST':'Cons.Def','KO':'Cons.Def','PEP':'Cons.Def','ABBV':'Health','MRK':'Health','XOM':'Energy','CVX':'Energy','LLY':'Health','AVGO':'Tech','ADBE':'Tech','ORCL':'Tech','CSCO':'Tech','PLTR':'Tech','SQ':'Finance','SHOP':'Tech','SOFI':'Finance','COIN':'Finance'};
const SCOL={'Tech':'#42a5f5','Finance':'#ab47bc','Health':'#66bb6a','Cons.Cyc':'#ff7043','Cons.Def':'#ffa726','Comms':'#ec407a','Energy':'#ef5350','Industrial':'#26a69a','Other':'#78909c'};

// ─── SVG Icons ───
const I=({n,s=20,c='currentColor'})=>{const p={home:<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>,briefcase:<><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></>,eye:<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,shield:<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,scan:<><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/><line x1="12" y1="7" x2="12" y2="13"/><circle cx="12" cy="16" r="0.5"/></>,settings:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></>,plus:<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,x:<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,trash:<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></>,search:<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,spark:<path d="M12 2l2.4 7.2L22 12l-7.6 2.8L12 22l-2.4-7.2L2 12l7.6-2.8z"/>,moon:<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>,sun:<><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></>,alert:<><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,trend:<><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></>,news:<><path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H8a2 2 0 00-2 2v16a2 2 0 01-2 2zm0 0a2 2 0 01-2-2v-9c0-1.1.9-2 2-2h2"/><line x1="10" y1="6" x2="18" y2="6"/><line x1="10" y1="10" x2="18" y2="10"/><line x1="10" y1="14" x2="14" y2="14"/></>,link:<><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></>};
return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{p[n]}</svg>;};

// ─── Chart ───
function getTooltipColors(){
  const s=getComputedStyle(document.documentElement);
  return{backgroundColor:s.getPropertyValue('--card').trim()||'#1a2035',titleColor:s.getPropertyValue('--t1').trim()||'#e8eaed',bodyColor:s.getPropertyValue('--t2').trim()||'#8b95a8',borderColor:s.getPropertyValue('--brd').trim()||'#1e2538'};
}
const LineChart=({data,labels,color='#00d4aa',height=160})=>{
  const ref=useRef(null),chart=useRef(null);
  useEffect(()=>{
    if(chart.current)chart.current.destroy();
    if(!ref.current||!data?.length)return;
    const tc=getTooltipColors();
    chart.current=new Chart(ref.current,{type:'line',data:{labels,datasets:[{data,borderColor:color,backgroundColor:color+'15',fill:true,tension:.4,pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:color,pointHoverBorderColor:color,pointHoverBorderWidth:2,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,...tc,borderWidth:1,cornerRadius:10,displayColors:false,padding:{x:12,y:8},titleFont:{size:11,weight:'normal'},bodyFont:{size:14,weight:'bold'},callbacks:{label:ctx=>{const v=ctx.parsed.y;return v!=null?'$'+v.toFixed(2):''}}}},scales:{x:{display:false},y:{display:false}},interaction:{mode:'nearest',intersect:false}}});
    return()=>{if(chart.current)chart.current.destroy()};
  },[data,labels,color]);
  return <div style={{height}}><canvas ref={ref}/></div>;
};
const Doughnut=({data,labels,colors,size=160})=>{
  const ref=useRef(null),chart=useRef(null);
  useEffect(()=>{
    if(chart.current)chart.current.destroy();
    if(!ref.current||!data?.length)return;
    const tc=getTooltipColors();
    chart.current=new Chart(ref.current,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:true,cutout:'68%',plugins:{legend:{display:false},tooltip:{...tc,borderWidth:1,cornerRadius:10,displayColors:false,padding:{x:12,y:8},callbacks:{label:ctx=>` ${ctx.label}: ${ctx.parsed.toFixed(1)}%`}}}}});
    return()=>{if(chart.current)chart.current.destroy()};
  },[data,labels,colors]);
  return <canvas ref={ref} style={{maxWidth:size,maxHeight:size,margin:'0 auto',display:'block'}}/>;
};

// ─── Body Scroll Lock ───
function useBodyScrollLock(){
  useEffect(()=>{
    const scrollY=window.scrollY;
    document.body.style.position='fixed';
    document.body.style.top=`-${scrollY}px`;
    document.body.style.left='0';
    document.body.style.right='0';
    document.body.style.overflow='hidden';
    return()=>{
      document.body.style.position='';
      document.body.style.top='';
      document.body.style.left='';
      document.body.style.right='';
      document.body.style.overflow='';
      window.scrollTo(0,scrollY);
    };
  },[]);
}

// ─── Time Ago ───
function timeAgo(dateStr){
  if(!dateStr)return'';
  const s=Math.floor((Date.now()-new Date(dateStr).getTime())/1000);
  if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  if(s<604800)return Math.floor(s/86400)+'d ago';
  return new Date(dateStr).toLocaleDateString();
}

// ─── News Card ───
const NewsCard=({item})=>(
  <a href={item.link} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()} style={{display:'flex',gap:12,padding:'12px 0',borderBottom:'1px solid var(--brd)',textDecoration:'none',color:'inherit',cursor:'pointer'}}>
    {item.thumbnail&&<img src={item.thumbnail} alt="" style={{width:72,height:54,objectFit:'cover',borderRadius:8,flexShrink:0,background:'var(--hover)'}}
      onError={e=>{e.target.style.display='none'}}/>}
    <div style={{flex:1,minWidth:0}}>
      <p style={{fontSize:13,fontWeight:600,lineHeight:1.4,marginBottom:4,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{item.title}</p>
      <div style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'var(--t3)'}}>
        <span>{item.publisher}</span>
        <span style={{opacity:.5}}>·</span>
        <span>{timeAgo(item.publishedAt)}</span>
        {item.relatedTickers?.length>0&&<><span style={{opacity:.5}}>·</span>{item.relatedTickers.slice(0,3).map(t=><span key={t} style={{color:'var(--acc)',fontWeight:600}}>{t}</span>)}</>}
      </div>
    </div>
  </a>
);

// ─── News Feed ───
const NewsFeed=({symbol,query})=>{
  const [news,setNews]=useState([]);
  const [loading,setLoading]=useState(true);
  const fetchKey=symbol||query||'general';
  useEffect(()=>{
    setLoading(true);
    let url;
    if(symbol)url=`/api/news/${symbol}`;
    else if(query)url=`/api/news?q=${encodeURIComponent(query)}`;
    else url='/api/news';
    api.get(url).then(n=>{setNews(n);setLoading(false);}).catch(()=>setLoading(false));
  },[fetchKey]);
  if(loading)return <div style={{textAlign:'center',padding:20}}><div className="sp"/></div>;
  if(!news.length)return <p style={{fontSize:12,color:'var(--t3)',textAlign:'center',padding:16}}>No news available</p>;
  return <div>{news.map((n,i)=><NewsCard key={i} item={n}/>)}</div>;
};

// ─── Ticker Search Modal ───
const SearchModal=({onClose,onSelect})=>{
  useBodyScrollLock();
  const [q,setQ]=useState('');
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const [trending,setTrending]=useState([]);
  const [searchErr,setSearchErr]=useState(null);
  const [vpHeight,setVpHeight]=useState(window.visualViewport?.height||window.innerHeight);
  const timer=useRef(null);

  useEffect(()=>{api.get('/api/trending').then(setTrending).catch(()=>{});},[]);

  // Track visual viewport (adjusts when iOS keyboard opens)
  useEffect(()=>{
    const vp=window.visualViewport;
    if(!vp)return;
    const onResize=()=>setVpHeight(vp.height);
    vp.addEventListener('resize',onResize);
    return()=>vp.removeEventListener('resize',onResize);
  },[]);

  useEffect(()=>{
    if(timer.current)clearTimeout(timer.current);
    if(q.length<1){setResults([]);return;}
    timer.current=setTimeout(async()=>{
      setLoading(true);setSearchErr(null);
      try{const r=await api.get(`/api/search?q=${encodeURIComponent(q)}`);setResults(r);}catch(e){setSearchErr(e.message);setResults([]);}
      setLoading(false);
    },300);
  },[q]);

  return(
    <div className="mo mo2" onClick={onClose} style={{alignItems:'flex-end'}}>
      <div className="mc fi" onClick={e=>e.stopPropagation()} style={{maxHeight:vpHeight*0.85}}>
        <div style={{display:'flex',gap:10,marginBottom:12,alignItems:'center',flexShrink:0}}>
          <div style={{flex:1,position:'relative'}}>
            <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search stocks (e.g. AAPL)" style={{paddingLeft:40,fontSize:16}}/>
            <div style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--t3)'}}><I n="search" s={18}/></div>
          </div>
          <button onClick={onClose} style={{background:'none',color:'var(--t2)',padding:8,minWidth:40,minHeight:40}}><I n="x" s={22}/></button>
        </div>
        <div style={{flex:1,overflowY:'auto',overscrollBehavior:'contain',WebkitOverflowScrolling:'touch',minHeight:0,paddingBottom:20}}>
        {loading && <div style={{textAlign:'center',padding:20}}><div className="sp"/></div>}
        {results.length > 0 ? (
          <div>{results.map(r=>(
            <div key={r.symbol} className="sr" onClick={()=>{onSelect(r);onClose();}}>
              <div><div style={{fontWeight:700,fontSize:15}}>{r.symbol}</div><div style={{fontSize:12,color:'var(--t2)'}}>{r.name}</div></div>
              <div style={{fontSize:11,color:'var(--t3)'}}>{r.exchange} · {r.type}</div>
            </div>
          ))}</div>
        ) : searchErr ? (
          <div style={{textAlign:'center',padding:30,color:'var(--t2)'}}><I n="alert" s={24} c="var(--red)"/><p style={{marginTop:8,fontSize:13}}>{searchErr}</p></div>
        ) : !loading && q.length > 0 && results.length === 0 ? (
          <div style={{textAlign:'center',padding:30,color:'var(--t3)'}}><I n="search" s={28} c="var(--t3)"/><p style={{marginTop:8,fontSize:13}}>No results for "{q}"</p><p style={{fontSize:11,marginTop:4}}>Try a different name or ticker symbol</p></div>
        ) : q.length === 0 && trending.length > 0 ? (
          <div>
            <div style={{fontSize:12,color:'var(--t3)',fontWeight:600,marginBottom:12,textTransform:'uppercase',letterSpacing:1}}>Trending Today</div>
            {trending.slice(0,10).map(t=>(
              <div key={t.symbol} className="sr" onClick={()=>{onSelect({symbol:t.symbol,name:t.name});onClose();}}>
                <div><div style={{fontWeight:700,fontSize:15}}>{t.symbol}</div><div style={{fontSize:12,color:'var(--t2)'}}>{t.name}</div></div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontWeight:600,fontSize:14}}>{F.$(t.price)}</div>
                  <div style={{fontSize:12,fontWeight:600,color:t.changePct>=0?'var(--grn)':'var(--red)'}}>{F.pct(t.changePct)}</div>
                </div>
              </div>
            ))}
          </div>
        ) : null}
        </div>
      </div>
    </div>
  );
};

// ─── Error Boundary ───
class ErrorBound extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e.message||'Something went wrong'};}
  render(){
    if(this.state.err)return React.createElement('div',{className:'mo',onClick:this.props.onClose},
      React.createElement('div',{className:'mc fi',onClick:e=>e.stopPropagation(),style:{textAlign:'center',padding:40}},
        React.createElement('p',{style:{color:'var(--red)',fontSize:16,fontWeight:700,marginBottom:8}},'Failed to load stock'),
        React.createElement('p',{style:{color:'var(--t3)',fontSize:12,marginBottom:16}},this.state.err),
        React.createElement('button',{className:'bs',onClick:this.props.onClose},'Close')
      )
    );
    return this.props.children;
  }
}

const OptionsChain=({symbol,stockPrice})=>{
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(false);
  const [expIdx,setExpIdx]=useState(0);
  const [tab,setTab]=useState('calls');
  const [expanded,setExpanded]=useState(false);

  const loadOptions=(date)=>{
    setLoading(true);
    const url=date?`/api/options/${symbol}?date=${date}`:`/api/options/${symbol}`;
    api.get(url).then(d=>{setData(d);setLoading(false);}).catch(()=>setLoading(false));
  };

  useEffect(()=>{if(expanded&&!data)loadOptions();},[expanded]);

  const selectExp=(idx)=>{
    setExpIdx(idx);
    if(data?.expirations[idx])loadOptions(data.expirations[idx].timestamp);
  };

  const opts=tab==='calls'?data?.calls:data?.puts;

    <div className="c">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>setExpanded(!expanded)}>

        {loading&&!data?<div style={{textAlign:'center',padding:20}}><div className="sp"/></div>:<>

            {data.expirations.slice(0,8).map((e,i)=>(
              <button key={e.timestamp} onClick={()=>selectExp(i)} style={{
                padding:'4px 10px',borderRadius:6,fontSize:10,fontWeight:600,whiteSpace:'nowrap',flexShrink:0,
                background:expIdx===i?'var(--blu)':'var(--hover)',color:expIdx===i?'#fff':'var(--t2)'

              background:tab==='calls'?'rgba(0,212,170,.15)':'var(--hover)',color:tab==='calls'?'var(--grn)':'var(--t2)',
              border:tab==='calls'?'1px solid var(--grn)':'1px solid transparent'
            }}>Calls</button>
            <button onClick={()=>setTab('puts')} style={{flex:1,padding:'6px 0',borderRadius:8,fontSize:12,fontWeight:700,
              background:tab==='puts'?'rgba(255,71,87,.15)':'var(--hover)',color:tab==='puts'?'var(--red)':'var(--t2)',
              border:tab==='puts'?'1px solid var(--red)':'1px solid transparent'

              <thead><tr style={{color:'var(--t3)',borderBottom:'1px solid var(--brd)'}}>

                <th style={{textAlign:'right',padding:'4px 6px',fontWeight:600}}>Last</th>

const StockDetailInner=({symbol,onClose})=>{

  const [ai,setAi]=useState(null);
  const [aiLoad,setAiLoad]=useState(false);
  const [range,setRange]=useState('1mo');
  const [error,setError]=useState(null);
  const [loadTimeout,setLoadTimeout]=useState(false);

  useEffect(()=>{
    setError(null);setLoadTimeout(false);
    const timer=setTimeout(()=>setLoadTimeout(true),12000);
    api.get(`/api/quote/${symbol}`).then(q=>{
      clearTimeout(timer);
      if(!q||q.price==null){setError('No data available for '+symbol);return;}
      setQuote(q);
    }).catch(e=>{clearTimeout(timer);setError(e.message||'Failed to load stock data');});
    api.get(`/api/financials/${symbol}`).then(setFin).catch(()=>{});
    return()=>clearTimeout(timer);

      api.get(`/api/quote/${symbol}`).then(q=>{if(q&&q.price!=null)setQuote(q);}).catch(()=>{});
    },10000);
    return()=>clearInterval(iv);

    setEditGroups(prev=>{
      const next=[...prev];
      const g=next[addingTo];
      if(g.symbols.includes(sym)){
        next[addingTo]={...g,symbols:g.symbols.filter(s=>s!==sym)};
      }else{
        next[addingTo]={...g,symbols:[...g.symbols,sym]};
      }
      return next;
    });
  };
  const moveGroup=(gi,dir)=>{
    setEditGroups(prev=>{
      const next=[...prev];
      const ni=gi+dir;
      if(ni<0||ni>=next.length)return prev;
      [next[gi],next[ni]]=[next[ni],next[gi]];
      return next;
    });
  };

  const filteredCatalog=ALL_MARKET_SYMBOLS.map(cat=>({
    ...cat,
    items:cat.items.filter(s=>{
      if(!search)return true;
      const q=search.toLowerCase();
      return s.toLowerCase().includes(q)||(MNAMES[s]||'').toLowerCase().includes(q);
    })
  })).filter(cat=>cat.items.length>0);

  return(
    <div className="mo" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="mc fi" style={{maxHeight:'90vh',maxHeight:'90dvh'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexShrink:0}}>
          <h3 style={{fontSize:16,fontWeight:700}}>Edit Markets</h3>
          <button onClick={onClose} style={{background:'none',color:'var(--t3)',fontSize:22,lineHeight:1,padding:4}}>✕</button>
        </div>

        {addingTo!=null?(
          <div style={{flex:1,overflow:'auto',minHeight:0}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,flexShrink:0}}>
              <button onClick={()=>{setAddingTo(null);setSearch('');}} className="bs" style={{padding:'6px 12px',fontSize:12}}>← Back</button>
              <span style={{fontSize:13,fontWeight:600}}>Add to: {editGroups[addingTo]?.label}</span>
            </div>
            <input placeholder="Search symbols..." value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:10,fontSize:13}}/>
            {filteredCatalog.map(cat=>(
              <div key={cat.cat} style={{marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--t3)',marginBottom:4,textTransform:'uppercase',letterSpacing:.5}}>{cat.cat}</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                  {cat.items.map(sym=>{
                    const inGroup=editGroups[addingTo]?.symbols.includes(sym);
                    return(
                      <button key={sym} onClick={()=>toggleSymbol(sym)} style={{
                        padding:'4px 10px',borderRadius:12,fontSize:11,fontWeight:600,
                        background:inGroup?'var(--acc)':'var(--hover)',
                        color:inGroup?'#000':'var(--t2)',
                        border:inGroup?'none':'1px solid var(--brd)',transition:'all .15s'
                      }}>{MNAMES[sym]||sym}{inGroup?' ✓':''}</button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        ):(
          <div style={{flex:1,overflow:'auto',minHeight:0}}>
            {editGroups.map((g,gi)=>(
              <div key={gi} style={{background:'var(--hover)',borderRadius:10,padding:10,marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <span style={{fontSize:13,fontWeight:700}}>{g.label}</span>
                  <div style={{display:'flex',gap:4}}>
                    <button onClick={()=>moveGroup(gi,-1)} style={{background:'none',color:'var(--t3)',fontSize:14,padding:'2px 6px'}} title="Move up">▲</button>
                    <button onClick={()=>moveGroup(gi,1)} style={{background:'none',color:'var(--t3)',fontSize:14,padding:'2px 6px'}} title="Move down">▼</button>
                    <button onClick={()=>setAddingTo(gi)} style={{background:'var(--accd)',color:'var(--acc)',fontSize:11,padding:'3px 8px',borderRadius:8,fontWeight:600}}>+ Add</button>
                    <button onClick={()=>removeGroup(gi)} style={{background:'rgba(255,71,87,.12)',color:'var(--red)',fontSize:11,padding:'3px 8px',borderRadius:8,fontWeight:600}}>Delete</button>
                  </div>
                </div>
                <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                  {g.symbols.map(sym=>(
                    <span key={sym} style={{
                      display:'inline-flex',alignItems:'center',gap:4,
                      padding:'3px 8px',borderRadius:10,fontSize:11,fontWeight:600,
                      background:'var(--bg2)',color:'var(--t2)',border:'1px solid var(--brd)'
                    }}>
                      {MNAMES[sym]||sym}
                      <button onClick={()=>removeSymbol(gi,sym)} style={{background:'none',color:'var(--red)',fontSize:13,lineHeight:1,padding:0}}>×</button>
                    </span>
                  ))}
                  {g.symbols.length===0&&<span style={{fontSize:11,color:'var(--t3)',fontStyle:'italic'}}>No symbols — tap Add</span>}
                </div>
              </div>
            ))}
            <div style={{display:'flex',gap:6,marginTop:6}}>
              <input placeholder="New group name..." value={newGrpName} onChange={e=>setNewGrpName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addGroup()} style={{flex:1,fontSize:13,padding:'8px 12px'}}/>
              <button onClick={addGroup} className="bp" style={{padding:'8px 14px',fontSize:12,flexShrink:0}}>+ Group</button>
            </div>
          </div>
        )}

        <div style={{display:'flex',gap:8,marginTop:12,flexShrink:0}}>
          <button onClick={()=>{setEditGroups(JSON.parse(JSON.stringify(DEFAULT_MGROUPS)));}} className="bs" style={{flex:1}}>Reset Default</button>
          <button onClick={()=>onSave(editGroups.filter(g=>g.symbols.length>0))} className="bp" style={{flex:1}}>Save</button>
        </div>
      </div>
    </div>
  );
};

const MarketOverview=({onStock})=>{

  const [mgroups,setMgroups]=useState(DEFAULT_MGROUPS);

            background:safeGrp===i?'var(--blu)':'var(--hover)',color:safeGrp===i?'#fff':'var(--t3)',transition:'all .2s'
          }}>{g.label}</button>

const Dashboard=({pos,wl,budget,onNav,onStock})=>{
  const tv=pos.reduce((s,p)=>s+(p.price*p.shares),0);
  const ti=pos.reduce((s,p)=>s+(p.buyPrice*p.shares),0);
  const pl=tv-ti;const plp=ti>0?(pl/ti)*100:0;

  // Health score
  const health=useMemo(()=>{
    if(!pos.length)return{score:0,f:{}};
    const w=pos.map(p=>(p.price*p.shares)/tv);const mw=Math.max(...w,0);
    const hhi=w.reduce((s,x)=>s+x*x,0);
    let ds=25;if(mw>.4)ds-=15;else if(mw>.25)ds-=8;if(pos.length<3)ds-=8;ds=Math.max(0,ds);
    const secs={};pos.forEach(p=>{const sec=SEC[p.ticker]||'Other';secs[sec]=(secs[sec]||0)+(p.price*p.shares);});
    const sw=Object.values(secs).map(v=>v/tv);const msw=Math.max(...sw,0);
    let ss=25;if(msw>.6)ss-=15;else if(msw>.4)ss-=8;if(Object.keys(secs).length<2)ss-=8;ss=Math.max(0,ss);
    const rp=ti>0?(pl/ti)*100:0;
    let ps=12;if(rp>20)ps=25;else if(rp>10)ps=20;else if(rp>0)ps=15;else if(rp>-10)ps=8;else ps=3;
    return{score:ds+ss+12+ps,f:{Diversity:ds,Sectors:ss,Value:12,Returns:ps}};
  },[pos,tv,ti,pl]);

  const hc=health.score>=70?'var(--grn)':health.score>=45?'var(--yel)':'var(--red)';

  // Sectors
  const secs={};
  pos.forEach(p=>{const sec=SEC[p.ticker]||'Other';secs[sec]=(secs[sec]||0)+(p.price*p.shares);});
  const sl=Object.keys(secs);const sd=sl.map(s=>tv>0?(secs[s]/tv)*100:0);const sc=sl.map(s=>SCOL[s]||'#78909c');

  return(
    <div className="fi">
      {pos.length===0?<div className="c" style={{background:'linear-gradient(135deg,var(--bg2) 0%,var(--card) 100%)',textAlign:'center',padding:'30px 20px'}}>

        <h2 style={{fontSize:20,fontWeight:700,marginBottom:6}}>Welcome to AI Portfolio</h2>
        <p style={{fontSize:13,color:'var(--t2)',lineHeight:1.5,marginBottom:16}}>Track your stocks, analyze with AI, and monitor risk — all in one place.</p>
        <button className="bp" onClick={()=>onNav('portfolio')} style={{padding:'12px 28px',fontSize:14}}>Add Your First Stock</button>
      </div>:
      <div className="c" style={{background:'linear-gradient(135deg,var(--bg2) 0%,var(--card) 100%)'}}>
        <div style={{fontSize:11,color:'var(--t3)',letterSpacing:1,textTransform:'uppercase'}}>Portfolio Value</div>
        <div style={{fontSize:34,fontWeight:700,marginTop:4,marginBottom:4}}>{F.$(tv)}</div>
        <div style={{display:'flex',gap:12,alignItems:'center'}}>
          <span style={{fontSize:15,fontWeight:600,color:pl>=0?'var(--grn)':'var(--red)'}}>{pl>=0?'+':''}{F.$(pl)}</span>
          <span className={`b ${pl>=0?'bg':'br'}`}>{F.pct(plp)}</span>
        </div>
        {budget.total>0&&<div style={{marginTop:14}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--t3)',marginBottom:4}}>
            <span>Budget</span><span>{F.$(ti)} / {F.$(budget.total)}</span>
          </div>
          <div className="pb"><div className="pf" style={{width:Math.min(100,(ti/budget.total)*100)+'%',background:ti>budget.total?'var(--red)':'var(--acc)'}}/></div>
        </div>}
      </div>}

      {/* Health */}
      <div className="c" style={{display:'flex',alignItems:'center',gap:14}}>
        <div style={{position:'relative',width:64,height:64,flexShrink:0}}>
          <svg viewBox="0 0 36 36" style={{width:64,height:64,transform:'rotate(-90deg)'}}>
            <path d="M18 2.0845a15.9155 15.9155 0 010 31.831 15.9155 15.9155 0 010-31.831" fill="none" stroke="var(--brd)" strokeWidth="3"/>
            <path d="M18 2.0845a15.9155 15.9155 0 010 31.831 15.9155 15.9155 0 010-31.831" fill="none" stroke={hc} strokeWidth="3" strokeDasharray={`${health.score},100`} style={{transition:'all .6s'}}/>
          </svg>
          <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',fontSize:18,fontWeight:700,color:hc}}>{health.score}</div>
        </div>
        <div style={{flex:1}}>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'3px 12px'}}>
            {Object.entries(health.f).map(([k,v])=>
              <div key={k} style={{fontSize:11,color:'var(--t2)',display:'flex',justifyContent:'space-between'}}>
                <span>{k}</span><span style={{fontWeight:600,color:v>=18?'var(--grn)':v>=10?'var(--yel)':'var(--red)'}}>{v}/25</span>

          </div>
        </div>
      </div>

      {/* Market Overview */}

        <button className="c" onClick={()=>onNav('watchlist')} style={{textAlign:'center',marginBottom:0,color:'var(--t1)'}}><I n="eye" s={22} c="var(--blu)"/><div style={{fontSize:13,fontWeight:600,marginTop:4}}>{wl.reduce((s,w)=>s+w.items.length,0)} Watching</div></button>
      </div>

      {/* Sectors */}
      {pos.length>0&&<div className="c">
        <h4 style={{fontSize:14,fontWeight:600,marginBottom:10}}>Sector Allocation</h4>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{flex:'0 0 130px'}}><Doughnut data={sd} labels={sl} colors={sc} size={130}/></div>
          <div style={{flex:1}}>{sl.map((s,i)=>
            <div key={s} style={{display:'flex',alignItems:'center',gap:6,marginBottom:5}}>
              <div style={{width:8,height:8,borderRadius:2,background:sc[i],flexShrink:0}}/>

      {/* Top holdings */}
      {pos.length>0&&<div className="c">
        <h4 style={{fontSize:14,fontWeight:600,marginBottom:10}}>Holdings P&L</h4>
        {[...pos].sort((a,b)=>((b.price-b.buyPrice)/b.buyPrice)-((a.price-a.buyPrice)/a.buyPrice)).slice(0,6).map(p=>{

            <div><span style={{fontWeight:600}}>{p.ticker}</span><span style={{fontSize:11,color:'var(--t3)',marginLeft:8}}>{p.shares}sh</span></div>
            <div style={{textAlign:'right'}}><span style={{fontWeight:600,fontSize:13,color:pct>=0?'var(--grn)':'var(--red)'}}>{F.pct(pct)}</span></div>

      {/* Market News */}
      <div className="c">
        <h4 style={{fontSize:14,fontWeight:600,marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
          <I n="news" s={16} c="var(--blu)"/> Market News

        <SectorNewsTabs/>
      </div>

  );

  };

  const confirmAdd=()=>{

// ─── Watchlist ───
const WatchlistView=({wl,setWl,onStock})=>{
  const [showSearch,setShowSearch]=useState(false);
  const [activeList,setActiveList]=useState(0);
  const [newListName,setNewListName]=useState('');
  const [showNewList,setShowNewList]=useState(false);
  const [editingListIdx,setEditingListIdx]=useState(null);
  const [editListName,setEditListName]=useState('');

  const addToList=(stock)=>{
    const u=[...wl];
    if(!u[activeList])return;
    if(u[activeList].items.find(i=>i.symbol===stock.symbol))return;
    u[activeList].items.push({symbol:stock.symbol,name:stock.name,addedAt:Date.now()});
    setWl(u);
  };

  const removeFromList=(symbol)=>{
    const u=[...wl];
    u[activeList].items=u[activeList].items.filter(i=>i.symbol!==symbol);
    setWl(u);
  };

  const createList=()=>{
    if(!newListName.trim())return;
    setWl([...wl,{name:newListName.trim(),items:[]}]);
    setActiveList(wl.length);
    setNewListName('');setShowNewList(false);
  };

  const renameList=()=>{
    if(editingListIdx==null||!editListName.trim())return;
    const u=[...wl];
    u[editingListIdx]={...u[editingListIdx],name:editListName.trim()};
    setWl(u);
    setEditingListIdx(null);setEditListName('');
  };

  const deleteList=(idx)=>{
    if(wl.length<=1)return;
    const u=wl.filter((_,i)=>i!==idx);
    setWl(u);
    if(activeList>=u.length)setActiveList(u.length-1);
  };

  // Fetch live prices for current list (auto-refresh every 30s)
  const [prices,setPrices]=useState({});
  useEffect(()=>{
    if(!wl[activeList]?.items.length)return;
    const fetchPrices=()=>{
      const syms=wl[activeList].items.map(i=>i.symbol).join(',');
      api.get(`/api/quotes?symbols=${syms}`).then(data=>{
        const m={};data.forEach(q=>{m[q.symbol]=q;});setPrices(m);
      }).catch(()=>{});
    };
    fetchPrices();
    const iv=setInterval(fetchPrices,10000);
    return()=>clearInterval(iv);
  },[wl,activeList]);

  const list=wl[activeList];

  return(
    <div className="fi">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <h2 style={{fontSize:20,fontWeight:700}}>Watchlists</h2>
        <div style={{display:'flex',gap:6}}>
          <button className="bs" onClick={()=>setShowNewList(true)} style={{padding:'8px 12px',fontSize:12}}>New List</button>
          <button className="bp" onClick={()=>setShowSearch(true)} style={{display:'flex',alignItems:'center',gap:4,padding:'8px 12px'}}><I n="plus" s={14}/> Add</button>
        </div>
      </div>

      {/* List tabs */}
      <div style={{display:'flex',gap:6,overflowX:'auto',marginBottom:16,paddingBottom:4,alignItems:'center'}}>
        {wl.map((w,i)=>
          <button key={i} onClick={()=>setActiveList(i)} onDoubleClick={(e)=>{e.preventDefault();setEditingListIdx(i);setEditListName(w.name);}} style={{
            padding:'6px 14px',borderRadius:20,fontSize:12,fontWeight:600,whiteSpace:'nowrap',flexShrink:0,
            background:activeList===i?'var(--acc)':'var(--hover)',
            color:activeList===i?'#000':'var(--t2)',
          }}>{w.name} ({w.items.length})</button>
        )}
        <button onClick={()=>{setEditingListIdx(activeList);setEditListName(wl[activeList]?.name||'');}} style={{background:'none',color:'var(--t3)',padding:4,flexShrink:0}} title="Rename list"><I n="settings" s={14}/></button>
      </div>

      {list && list.items.length===0?
        <div className="c" style={{textAlign:'center',padding:40}}>
          <I n="eye" s={40} c="var(--t3)"/>
          <p style={{color:'var(--t3)',marginTop:12}}>Empty list. Search to add stocks!</p>
        </div>
      :list&&
        <div className="c">{list.items.map(item=>{
          const q=prices[item.symbol];
          return(<div key={item.symbol} className="sr" onClick={()=>onStock(item.symbol)}>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontWeight:700,fontSize:15}}>{item.symbol}</span>
                {q?.pe&&<span style={{fontSize:10,color:'var(--t3)',background:'var(--hover)',padding:'1px 6px',borderRadius:4}}>P/E {q.pe.toFixed(1)}</span>}
              </div>
              <div style={{fontSize:12,color:'var(--t2)',marginTop:2}}>{item.name||item.symbol}{q?' · '+F.c(q.mktCap):''}</div>
            </div>
            <div style={{textAlign:'right'}}>
              {q?<><div style={{fontWeight:600,fontSize:14}}>{F.$(q.price)}</div>
              <div style={{fontSize:12,fontWeight:600,color:q.changePct>=0?'var(--grn)':'var(--red)'}}>{F.pct(q.changePct)}</div></>
              :<div className="sp" style={{width:14,height:14}}/>}
            </div>
            <button onClick={e=>{e.stopPropagation();if(confirm(`Remove ${item.symbol} from watchlist?`))removeFromList(item.symbol);}} style={{background:'none',color:'var(--t3)',marginLeft:6,padding:10,minWidth:40,minHeight:40,display:'flex',alignItems:'center',justifyContent:'center'}}><I n="trash" s={16}/></button>
          </div>);
        })}</div>
      }

      {wl.length>1&&<button className="bd" onClick={()=>{if(confirm(`Delete "${list?.name}" watchlist and all its items?`))deleteList(activeList);}} style={{marginTop:8,width:'100%'}}>Delete "{list?.name}" List</button>}

      {showSearch&&<SearchModal onClose={()=>setShowSearch(false)} onSelect={addToList}/>}
      {showNewList&&<div className="mo" onClick={()=>setShowNewList(false)}>
        <div className="mc fi" onClick={e=>e.stopPropagation()}>
          <h3 style={{fontSize:18,fontWeight:700,marginBottom:16}}>New Watchlist</h3>
          <input autoFocus value={newListName} onChange={e=>setNewListName(e.target.value)} placeholder="e.g. Tech Stocks, Dividends..." onKeyDown={e=>e.key==='Enter'&&createList()} style={{marginBottom:16,fontSize:16}}/>
          <button className="bp" onClick={createList} style={{width:'100%'}}>Create</button>
        </div>
      </div>}
      {editingListIdx!=null&&<div className="mo" onClick={()=>setEditingListIdx(null)}>
        <div className="mc fi" onClick={e=>e.stopPropagation()}>
          <h3 style={{fontSize:18,fontWeight:700,marginBottom:4}}>Rename List</h3>
          <p style={{fontSize:12,color:'var(--t3)',marginBottom:16}}>Use emojis for quick recognition</p>
          <input autoFocus value={editListName} onChange={e=>setEditListName(e.target.value)} placeholder="e.g. Tech Picks, Dividend Kings..." onKeyDown={e=>e.key==='Enter'&&renameList()} style={{marginBottom:16,fontSize:16}}/>
          <button className="bp" onClick={renameList} style={{width:'100%',marginBottom:8}}>Save Name</button>
          <button className="bs" onClick={()=>setEditingListIdx(null)} style={{width:'100%'}}>Cancel</button>
        </div>
      </div>}
    </div>
  );
};

// ─── AI Scanner ───
const ScannerView=({pos})=>{
  const [scan,setScan]=useState(null);
  const [loading,setLoading]=useState(false);
  const [tab,setTab]=useState('scan');
  const [screener,setScreener]=useState([]);
  const [scrType,setScrType]=useState('gainers');
  const [scrLoad,setScrLoad]=useState(false);
  const [selectedStock,setSelectedStock]=useState(null);

  const runScan=async()=>{
    setLoading(true);
    try{
      const portfolio=pos.map(p=>({ticker:p.ticker,shares:p.shares,value:p.price*p.shares}));
      const data=await api.post('/api/scan',{portfolio});
      setScan(data);
    }catch(e){setScan({error:e.message});}
    setLoading(false);
  };

  const [scrErr,setScrErr]=useState(null);
  const loadScreener=async(type)=>{
    setScrType(type);setScrLoad(true);setScrErr(null);
    try{const data=await api.get(`/api/screener/${type}`);setScreener(data);}catch(e){setScrErr(e.message);}
    setScrLoad(false);
  };

  useEffect(()=>{if(tab==='screener')loadScreener(scrType);},[tab]);

  const bc=v=>v==='Strong Buy'||v==='Buy'?'bg':v==='Avoid'?'br':'by';

  return(
    <div className="fi">
      <h2 style={{fontSize:20,fontWeight:700,marginBottom:12}}>AI Scanner</h2>

      <div className="pill">
        <button className={tab==='scan'?'active':''} onClick={()=>setTab('scan')}>AI Scan</button>
        <button className={tab==='screener'?'active':''} onClick={()=>setTab('screener')}>Screener</button>
      </div>

      {tab==='scan'&&<>
        <div className="c" style={{textAlign:'center',background:'var(--accd)',border:'1px solid var(--acc)'}}>
          <I n="spark" s={32} c="var(--acc)"/>
          <h3 style={{fontSize:16,fontWeight:600,marginTop:8,marginBottom:4}}>AI Market Scanner</h3>
          <p style={{fontSize:13,color:'var(--t2)',marginBottom:14}}>Claude analyzes 40+ stocks and finds opportunities based on your portfolio.</p>
          <button className="bp" onClick={runScan} disabled={loading} style={{padding:'12px 32px',fontSize:15}}>
            {loading?<><span className="sp" style={{width:16,height:16,marginRight:8}}/>Scanning Market...</>:'Scan Market'}
          </button>
        </div>

        {scan&&!scan.error&&<>
          <div className="c">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <h4 style={{fontSize:14,fontWeight:600}}>Market Sentiment</h4>
              <span className={`b ${scan.marketSentiment==='Bullish'?'bg':scan.marketSentiment==='Bearish'?'br':'by'}`}>{scan.marketSentiment}</span>
            </div>
            <p style={{fontSize:13,color:'var(--t2)',lineHeight:1.5}}>{scan.marketSummary}</p>
            {scan.sectorOpportunity&&<p style={{fontSize:12,color:'var(--acc)',marginTop:6}}>{scan.sectorOpportunity}</p>}
            {scan.diversificationTip&&<p style={{fontSize:12,color:'var(--t3)',marginTop:4}}>{scan.diversificationTip}</p>}
          </div>

          <div className="c">
            <h4 style={{fontSize:14,fontWeight:600,marginBottom:10}}>Recommendations</h4>
            {(scan.recommendations||[]).map((r,i)=>
              <div key={i} className="sr" onClick={()=>setSelectedStock(r.symbol)} style={{padding:'10px 0'}}>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
                    <span style={{fontWeight:700,fontSize:15}}>{r.symbol}</span>
                    <span className={`b ${bc(r.action)}`} style={{fontSize:10}}>{r.action}</span>
                    <span style={{fontSize:10,color:'var(--t3)',background:'var(--hover)',padding:'1px 6px',borderRadius:4}}>{r.category}</span>
                  </div>
                  <p style={{fontSize:12,color:'var(--t2)'}}>{r.reason}</p>
                </div>
              </div>
            )}
          </div>
        </>}
        {scan?.error&&<div className="c" style={{background:'rgba(255,71,87,.08)',border:'1px solid rgba(255,71,87,.2)'}}>
          <p style={{fontSize:13,color:'var(--red)'}}>{scan.error}</p>
          <p style={{fontSize:12,color:'var(--t3)',marginTop:4}}>Make sure ANTHROPIC_API_KEY is set in your .env file.</p>
        </div>}
      </>}

      {tab==='screener'&&<>
        <div className="pill">
          {[['gainers','Top Gainers'],['losers','Top Losers'],['active','Most Active']].map(([k,l])=>
            <button key={k} className={scrType===k?'active':''} onClick={()=>loadScreener(k)}>{l}</button>
          )}
        </div>
        {scrLoad?<div style={{textAlign:'center',padding:40}}><div className="sp"/></div>:
          scrErr?<div className="c" style={{textAlign:'center',padding:30}}><I n="alert" s={28} c="var(--red)"/><p style={{color:'var(--t2)',marginTop:8,fontSize:13}}>{scrErr}</p><button className="bs" onClick={()=>loadScreener(scrType)} style={{marginTop:10}}>Retry</button></div>:
          <div className="c">{screener.map(s=>
            <div key={s.symbol} className="sr" onClick={()=>setSelectedStock(s.symbol)}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:15}}>{s.symbol}</div>
                <div style={{fontSize:12,color:'var(--t2)'}}>{s.name}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontWeight:600,fontSize:14}}>{F.$(s.price)}</div>
                <div style={{fontSize:12,fontWeight:600,color:s.changePct>=0?'var(--grn)':'var(--red)'}}>{F.pct(s.changePct)}</div>
              </div>
            </div>
          )}</div>
        }
      </>}

      {selectedStock&&<StockDetail symbol={selectedStock} onClose={()=>setSelectedStock(null)}/>}
    </div>
  );
};

// ─── Risk ───
const RiskView=({pos,budget})=>{
  const tv=pos.reduce((s,p)=>s+(p.price*p.shares),0);
  const w=pos.map(p=>({t:p.ticker,w:tv>0?((p.price*p.shares)/tv)*100:0,b:p.beta||1}));
  const secs={};pos.forEach(p=>{const sec=SEC[p.ticker]||'Other';secs[sec]=(secs[sec]||0)+(p.price*p.shares);});
  const ab=tv>0?pos.reduce((s,p)=>s+((p.beta||1)*(p.price*p.shares)),0)/tv:0;
  const hhi=w.reduce((s,x)=>s+(x.w/100)**2,0);

  return(
    <div className="fi">
      <h2 style={{fontSize:20,fontWeight:700,marginBottom:16}}>Risk Analysis</h2>
      {pos.length===0?
        <div className="c" style={{textAlign:'center',padding:40}}><I n="shield" s={40} c="var(--t3)"/><p style={{color:'var(--t3)',marginTop:12}}>Add positions first</p></div>
      :<>
        <div className="g2" style={{marginBottom:12}}>
          <div className="c" style={{textAlign:'center',marginBottom:0}}>
            <div style={{fontSize:11,color:'var(--t3)'}}>BETA</div>
            <div style={{fontSize:26,fontWeight:700,color:ab>1.3?'var(--red)':ab>.9?'var(--yel)':'var(--grn)'}}>{ab.toFixed(2)}</div>
            <div style={{fontSize:11,color:'var(--t3)'}}>{ab>1.3?'High Vol':ab>.9?'Market-like':'Low Vol'}</div>
          </div>
          <div className="c" style={{textAlign:'center',marginBottom:0}}>
            <div style={{fontSize:11,color:'var(--t3)'}}>CONCENTRATION</div>
            <span className={`b ${hhi>.3?'br':hhi>.15?'by':'bg'}`} style={{fontSize:14,marginTop:4}}>{hhi>.3?'High':hhi>.15?'Moderate':'Low'}</span>
            <div style={{fontSize:11,color:'var(--t3)',marginTop:4}}>HHI {(hhi*10000).toFixed(0)}</div>
          </div>
        </div>

        <div className="c">
          <h4 style={{fontSize:14,fontWeight:600,marginBottom:10}}>Position Weights</h4>
          {[...w].sort((a,b)=>b.w-a.w).map(x=>
            <div key={x.t} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
                <span style={{fontWeight:600}}>{x.t}</span>
                <span style={{color:x.w>(budget.maxPerStock||20)?'var(--red)':'var(--t2)'}}>{x.w.toFixed(1)}%{x.w>(budget.maxPerStock||20)?' !!':''}</span>
              </div>
              <div className="pb"><div className="pf" style={{width:Math.min(100,x.w)+'%',background:x.w>(budget.maxPerStock||20)?'var(--red)':'var(--acc)'}}/></div>
            </div>
          )}
        </div>

        <div className="c">
          <h4 style={{fontSize:14,fontWeight:600,marginBottom:10}}>Sector Exposure</h4>
          {Object.entries(secs).sort((a,b)=>b[1]-a[1]).map(([sec,val])=>{
            const pct=(val/tv)*100;
            return(<div key={sec} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:8,height:8,borderRadius:2,background:SCOL[sec]||'#78909c'}}/><span>{sec}</span></div>
                <span style={{color:pct>(budget.maxPerSector||40)?'var(--red)':'var(--t2)'}}>{pct.toFixed(1)}%{pct>(budget.maxPerSector||40)?' !!':''}</span>
              </div>
              <div className="pb"><div className="pf" style={{width:Math.min(100,pct)+'%',background:SCOL[sec]||'#78909c'}}/></div>
            </div>);
          })}
        </div>
      </>}
    </div>
  );
};

            <I n="trend" s={14}/> Yahoo Finance
          </button>
          <button onClick={()=>handleSourceChange('alphavantage')} className={dataSource==='alphavantage'?'bp':'bs'} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6,fontSize:13}}>
            <I n="spark" s={14}/> Alpha Vantage
          </button>
        </div>
        <div style={{background:'var(--hover)',borderRadius:8,padding:10,marginBottom:8}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
            <div style={{width:6,height:6,borderRadius:3,background:dataSource==='yahoo'?'var(--grn)':'var(--t3)'}}/>
            <span style={{fontSize:12,fontWeight:600,color:dataSource==='yahoo'?'var(--t1)':'var(--t3)'}}>Yahoo Finance</span>
            <span style={{fontSize:10,color:'var(--t3)',marginLeft:'auto'}}>{dataSource==='yahoo'?'Active':'Backup'}</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{width:6,height:6,borderRadius:3,background:dataSource==='alphavantage'?'var(--grn)':'var(--t3)'}}/>
            <span style={{fontSize:12,fontWeight:600,color:dataSource==='alphavantage'?'var(--t1)':'var(--t3)'}}>Alpha Vantage</span>
            <span style={{fontSize:10,color:'var(--t3)',marginLeft:'auto'}}>{dataSource==='alphavantage'?'Active':'Backup'}</span>
          </div>
        </div>
        <p style={{fontSize:11,color:'var(--t3)'}}>If the active source fails, the app automatically tries the backup.</p>
      </div>
      <div className="c">
        <h4 style={{fontSize:14,fontWeight:600,marginBottom:4}}>Alpha Vantage API Key</h4>
        <p style={{fontSize:12,color:'var(--t2)',marginBottom:8}}>Required to use Alpha Vantage. Free keys available at <a href="https://www.alphavantage.co/support/#api-key" target="_blank" style={{color:'var(--acc)'}}>alphavantage.co</a> (5 req/min, 500/day).</p>
        <div style={{display:'flex',gap:8}}>
          <input type="password" value={avKey} onChange={e=>setAvKey(e.target.value)} placeholder="Enter your Alpha Vantage key" style={{flex:1}}/>
          <button onClick={handleAvKeySave} className="bp" style={{whiteSpace:'nowrap',minWidth:60}}>{avSaved?'Saved!':'Save'}</button>
        </div>
        {avKey && <p style={{fontSize:11,color:'var(--grn)',marginTop:6}}>Key configured. Alpha Vantage is available as {dataSource==='alphavantage'?'primary':'backup'} source.</p>}
      </div>
      <div className="c">
        <h4 style={{fontSize:14,fontWeight:600,marginBottom:4}}>Claude API</h4>
        <p style={{fontSize:12,color:'var(--t2)',marginBottom:8}}>Set your API key in the <code style={{background:'var(--hover)',padding:'2px 6px',borderRadius:4}}>.env</code> file on the server.</p>
        <p style={{fontSize:12,color:'var(--t3)'}}>Get a key at <a href="https://console.anthropic.com" target="_blank" style={{color:'var(--acc)'}}>console.anthropic.com</a></p>
      </div>
      <div className="c">
        <h4 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Budget & Limits</h4>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,color:'var(--t2)',display:'block',marginBottom:4}}>Total Budget ($)</label>
          <input type="number" value={budget.total||''} onChange={e=>setBudget({...budget,total:parseFloat(e.target.value)||0})} placeholder="50000"/>
        </div>
        <div className="g2">
          <div><label style={{fontSize:12,color:'var(--t2)',display:'block',marginBottom:4}}>Max/Stock (%)</label><input type="number" value={budget.maxPerStock||''} onChange={e=>setBudget({...budget,maxPerStock:parseFloat(e.target.value)||20})} placeholder="20"/></div>
          <div><label style={{fontSize:12,color:'var(--t2)',display:'block',marginBottom:4}}>Max/Sector (%)</label><input type="number" value={budget.maxPerSector||''} onChange={e=>setBudget({...budget,maxPerSector:parseFloat(e.target.value)||40})} placeholder="40"/></div>
        </div>
      </div>
      <div className="c">
        <h4 style={{fontSize:14,fontWeight:600,marginBottom:8}}>Data</h4>
        <p style={{fontSize:12,color:'var(--t2)',marginBottom:10}}>Portfolio data is stored in your browser. Stock data source: <span style={{color:'var(--acc)',fontWeight:600}}>{dataSource==='yahoo'?'Yahoo Finance':'Alpha Vantage'}</span></p>
        <button className="bd" onClick={()=>{if(confirm('Reset all data?')){localStorage.clear();location.reload();}}}>Reset All Data</button>
      </div>
      <p style={{textAlign:'center',fontSize:11,color:'var(--t3)',padding:16}}>AI Portfolio Manager v2.1 — Not financial advice</p>
    </div>
  );
};

// ═══════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════
const App=()=>{
  const [tab,setTab]=useState('home');
  const [theme,setTheme]=useState(S.g('theme','dark'));
  const [pos,setPos]=useState(S.g('pos',[]));
  const [wl,setWl]=useState(S.g('wl',[{name:'Main',items:[]}]));
  const [budget,setBudget]=useState(S.g('budget',{total:0,maxPerStock:20,maxPerSector:40}));
  const [selectedStock,setSelectedStock]=useState(null);
  const [showGlobalSearch,setShowGlobalSearch]=useState(false);
  const [dbLoaded,setDbLoaded]=useState(false);
  const [syncStatus,setSyncStatus]=useState(null);

  // Load from server DB on startup (server is source of truth)
  useEffect(()=>{
    api.get('/api/db/state').then(state=>{
      if(state.positions?.length||state.watchlists?.length){
        setPos(state.positions||[]);
        setWl(state.watchlists?.length?state.watchlists:[{name:'Main',items:[]}]);
        setBudget(state.budget||{total:0,maxPerStock:20,maxPerSector:40});
        setTheme(state.theme||'dark');
        // Cache locally
        S.s('pos',state.positions||[]);
        S.s('wl',state.watchlists?.length?state.watchlists:[{name:'Main',items:[]}]);
        S.s('budget',state.budget||{total:0,maxPerStock:20,maxPerSector:40});
        S.s('theme',state.theme||'dark');
        if(state.dataSource)S.s('dataSource',state.dataSource);
        if(state.avKey)S.s('avKey',state.avKey);
        setSyncStatus('loaded');
      } else {
        // DB is empty — push local data to server (first-time migration)
        const localPos=S.g('pos',[]);
        const localWl=S.g('wl',[{name:'Main',items:[]}]);
        if(localPos.length){
          api.put('/api/db/positions/sync',{positions:localPos}).catch(()=>{});
        }
        if(localWl.length){
          api.put('/api/db/watchlists/sync',{watchlists:localWl}).catch(()=>{});
        }
        const localBudget=S.g('budget',{total:0,maxPerStock:20,maxPerSector:40});
        api.put('/api/db/settings',{key:'budget',value:localBudget}).catch(()=>{});
        api.put('/api/db/settings',{key:'theme',value:S.g('theme','dark')}).catch(()=>{});
        setSyncStatus('migrated');
      }
      setDbLoaded(true);
    }).catch(e=>{
      console.warn('DB load failed, using localStorage:',e);
      setDbLoaded(true);
      setSyncStatus('offline');
    });
  },[]);

  // Persist to localStorage + sync to server DB
  useEffect(()=>{if(!dbLoaded)return;S.s('pos',pos);syncToServer('positions',pos);},[pos]);
  useEffect(()=>{if(!dbLoaded)return;S.s('wl',wl);syncToServer('watchlists',wl);},[wl]);
  useEffect(()=>{if(!dbLoaded)return;S.s('budget',budget);syncToServer('budget',budget);},[budget]);
  useEffect(()=>{if(!dbLoaded)return;S.s('theme',theme);syncToServer('theme',theme);document.documentElement.setAttribute('data-theme',theme);},[theme]);
  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);},[]);

  // Auto-refresh prices every 30s
  const [refreshErr,setRefreshErr]=useState(null);
  useEffect(()=>{
    if(!pos.length)return;
    const refresh=async()=>{
      try{
        const syms=pos.map(p=>p.ticker).join(',');
        const data=await api.get(`/api/quotes?symbols=${syms}`);
        const priceMap={};data.forEach(q=>{priceMap[q.symbol]=q;});
        setPos(prev=>prev.map(p=>{
          const q=priceMap[p.ticker];
          return q?{...p,price:q.price,beta:q.beta}:p;
        }));
        setRefreshErr(null);
      }catch(e){setRefreshErr(e.message);}
    };
    refresh();
    const iv=setInterval(refresh,10000);
    return()=>clearInterval(iv);
  },[pos.length]); // only restart when count changes

  // Auto-sync from server every 30s (cross-device sync)
  useEffect(()=>{
    if(!dbLoaded)return;
    const syncFromServer=async()=>{
      try{
        const state=await api.get('/api/db/state');
        if(!state)return;
        // Only update if server data differs (compare JSON strings to avoid loops)
        if(state.positions&&JSON.stringify(state.positions)!==JSON.stringify(pos)){
          setPos(prev=>{const merged=state.positions.map(sp=>{const local=prev.find(p=>p.ticker===sp.ticker);return local?{...sp,price:local.price,beta:local.beta}:sp;});return merged;});
          S.s('pos',state.positions);
        }
        if(state.watchlists&&JSON.stringify(state.watchlists)!==JSON.stringify(wl)){
          setWl(state.watchlists);S.s('wl',state.watchlists);
        }
        if(state.budget&&JSON.stringify(state.budget)!==JSON.stringify(budget)){
          setBudget(state.budget);S.s('budget',state.budget);
        }
      }catch{}
    };
    const iv=setInterval(syncFromServer,30000);
    return()=>clearInterval(iv);
  },[dbLoaded]);

  const tabs=[
    {id:'home',icon:'home',label:'Home'},
    {id:'portfolio',icon:'briefcase',label:'Portfolio'},
    {id:'watchlist',icon:'eye',label:'Watch'},
    {id:'scanner',icon:'scan',label:'Scanner'},
    {id:'risk',icon:'shield',label:'Risk'},
    {id:'settings',icon:'settings',label:'More'},
  ];

  return(
    <div style={{paddingBottom:'calc(var(--nav) + var(--sab) + 20px)'}}>
      {/* Header */}
      <div style={{position:'sticky',top:0,zIndex:100,background:'var(--bg)',borderBottom:'1px solid var(--brd)',padding:'10px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',backdropFilter:'blur(12px)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:30,height:30,borderRadius:8,background:'linear-gradient(135deg,var(--acc),#42a5f5)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:700,color:'#000'}}>$</div>
          <span style={{fontWeight:700,fontSize:15}}>AI Portfolio</span>
          <span className="live" style={{marginLeft:4}}/>
          {syncStatus==='loaded'&&<span style={{fontSize:9,color:'var(--t3)',marginLeft:4}} title="Synced with server">DB</span>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          <button onClick={()=>setShowGlobalSearch(true)} style={{background:'none',color:'var(--t2)',padding:6}} title="Search stocks"><I n="search" s={20}/></button>
          <button onClick={()=>setTheme(theme==='dark'?'light':'dark')} style={{background:'none',color:'var(--t2)',padding:6}}><I n={theme==='dark'?'sun':'moon'} s={20}/></button>
        </div>
      </div>

      {/* Error banner */}
      {refreshErr&&<div style={{background:'rgba(255,71,87,.1)',padding:'6px 16px',fontSize:12,color:'var(--red)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span>Data refresh failed: {refreshErr}</span>
        <button onClick={()=>setRefreshErr(null)} style={{background:'none',color:'var(--red)',padding:4,fontSize:16,fontWeight:700}}>&times;</button>
      </div>}

      {/* Content */}
      <div style={{padding:16,maxWidth:600,margin:'0 auto'}}>
        {tab==='home'&&<Dashboard pos={pos} wl={wl} budget={budget} onNav={setTab} onStock={setSelectedStock}/>}
        {tab==='portfolio'&&<PortfolioView pos={pos} setPos={setPos} onStock={setSelectedStock}/>}
        {tab==='watchlist'&&<WatchlistView wl={wl} setWl={setWl} onStock={setSelectedStock}/>}
        {tab==='scanner'&&<ScannerView pos={pos}/>}
        {tab==='risk'&&<RiskView pos={pos} budget={budget}/>}
        {tab==='settings'&&<SettingsView theme={theme} setTheme={setTheme} budget={budget} setBudget={setBudget}/>}
      </div>

      {/* Bottom Nav */}
      <nav style={{position:'fixed',bottom:0,left:0,right:0,background:'var(--bg2)',borderTop:'1px solid var(--brd)',display:'flex',justifyContent:'space-around',alignItems:'flex-start',zIndex:100,paddingTop:8,paddingBottom:'calc(var(--sab) + 10px)',height:'calc(var(--nav) + var(--sab) + 4px)'}}>
        {tabs.map(t=>
          <button key={t.id} onClick={()=>setTab(t.id)} style={{background:'none',color:tab===t.id?'var(--acc)':'var(--t3)',display:'flex',flexDirection:'column',alignItems:'center',gap:1,padding:'4px 8px'}}>
            <I n={t.icon} s={20} c={tab===t.id?'var(--acc)':'var(--t3)'}/>
            <span style={{fontSize:9,fontWeight:tab===t.id?600:400}}>{t.label}</span>
          </button>
        )}
      </nav>

      {showGlobalSearch&&<SearchModal onClose={()=>setShowGlobalSearch(false)} onSelect={(s)=>{setSelectedStock(s.symbol);setShowGlobalSearch(false);}}/>}
      {selectedStock&&<StockDetail symbol={selectedStock} onClose={()=>setSelectedStock(null)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
